<!DOCTYPE html>
<html>
<head>
  <title>Register - TaskFlow Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <h2>TaskFlow Store</h2>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
      <a href="login.html">Login</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <section class="page-header">
    <div class="container">
      <h1>Create your account</h1>
      <p>Register now to keep your cart and place orders securely.</p>
    </div>
  </section>

  <div class="card">
    <h2>Register</h2>
    <label for="name">Name</label>
    <input id="name" placeholder="Your Name" />
    <label for="email">Email</label>
    <input id="email" placeholder="Email" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" />
    <button onclick="registerUser()">Register</button>
    <p style="margin-top:18px; color:#cfd8ff;">Already registered? <a href="login.html" style="color:#80c6ff;">Login here</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
